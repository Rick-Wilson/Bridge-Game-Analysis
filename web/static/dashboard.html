<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard - Club Game Analysis</title>
<style>
:root { --bg: #f8f9fa; --surface: #fff; --text: #212529; --muted: #6c757d; --border: #dee2e6; --primary: #2563eb; --radius: 8px; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; padding: 1rem; }
h1 { font-size: 1.25rem; margin-bottom: 1rem; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; }
.card h3 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 0.25rem; }
.card .value { font-size: 1.5rem; font-weight: 700; }
table { width: 100%; border-collapse: collapse; font-size: 0.8125rem; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); }
th, td { padding: 0.4rem 0.625rem; text-align: left; border-bottom: 1px solid var(--border); }
th { background: var(--bg); font-size: 0.75rem; text-transform: uppercase; color: var(--muted); }
.section { margin-bottom: 1.5rem; }
.section h2 { font-size: 1rem; margin-bottom: 0.5rem; }
.bar { height: 20px; background: var(--primary); border-radius: 3px; min-width: 2px; }
.bar-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.25rem; font-size: 0.8rem; }
.bar-label { width: 100px; text-align: right; flex-shrink: 0; }
.bar-container { flex: 1; background: #e5e7eb; border-radius: 3px; height: 20px; }
.bar-value { font-size: 0.75rem; color: var(--muted); width: 40px; }
</style>
</head>
<body>
<h1>Club Game Analysis - Admin Dashboard</h1>

<div id="loading">Loading stats...</div>
<div id="content" style="display:none;">

<div class="grid">
  <div class="card"><h3>Total Requests</h3><div class="value" id="total-requests">-</div></div>
  <div class="card"><h3>Unique Visitors</h3><div class="value" id="unique-visitors">-</div></div>
  <div class="card"><h3>Avg Duration</h3><div class="value" id="avg-duration">-</div></div>
</div>

<div class="section">
  <h2>Requests by Day</h2>
  <div id="daily-chart"></div>
</div>

<div class="grid">
  <div class="section">
    <h2>Browsers</h2>
    <div id="browser-chart"></div>
  </div>
  <div class="section">
    <h2>Devices</h2>
    <div id="device-chart"></div>
  </div>
</div>

<div class="section">
  <h2>Actions</h2>
  <div id="action-chart"></div>
</div>

<div class="section">
  <h2>Top Visitors</h2>
  <table>
    <thead><tr><th>Visitor</th><th>Requests</th></tr></thead>
    <tbody id="visitors-table"></tbody>
  </table>
</div>

</div>

<script>
const BASE = '{{BASE_PATH}}';
const params = new URLSearchParams(window.location.search);
const key = params.get('key') || '';

async function loadStats() {
  try {
    const res = await fetch(`${BASE}/admin/api/stats?key=${key}`);
    if (!res.ok) { document.getElementById('loading').textContent = 'Access denied'; return; }
    const stats = await res.json();
    render(stats);
  } catch(e) {
    document.getElementById('loading').textContent = 'Error: ' + e.message;
  }
}

function render(s) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = '';

  document.getElementById('total-requests').textContent = s.total_requests;
  document.getElementById('unique-visitors').textContent = Object.keys(s.requests_by_user).length;
  document.getElementById('avg-duration').textContent =
    s.total_requests > 0 ? Math.round(s.total_duration_ms / s.total_requests) + 'ms' : '-';

  renderBarChart('daily-chart', s.requests_by_day);
  renderBarChart('browser-chart', s.requests_by_browser);
  renderBarChart('device-chart', s.requests_by_device);
  renderBarChart('action-chart', s.requests_by_action);

  const sorted = Object.entries(s.requests_by_user).sort((a,b) => b[1]-a[1]);
  document.getElementById('visitors-table').innerHTML = sorted.slice(0, 20).map(
    ([name, count]) => `<tr><td>${name}</td><td>${count}</td></tr>`
  ).join('');
}

function renderBarChart(id, data) {
  const el = document.getElementById(id);
  const sorted = Object.entries(data).sort((a,b) => a[0].localeCompare(b[0]));
  const max = Math.max(...sorted.map(([,v]) => v), 1);
  el.innerHTML = sorted.map(([label, value]) =>
    `<div class="bar-row">
      <span class="bar-label">${label}</span>
      <div class="bar-container"><div class="bar" style="width:${(value/max*100).toFixed(1)}%"></div></div>
      <span class="bar-value">${value}</span>
    </div>`
  ).join('');
}

loadStats();
</script>
</body>
</html>
