name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # Hardcoded lowercase. ghcr.io rejects mixed-case paths, and the service
  # name is shorter than the repo name (the repo is "Bridge-Club-Game-Analysis"
  # but the deployed service is "bridge-analysis" because we do more than
  # club games now). The maintainer's local justfile and the platform repo's
  # compose entry point at this same image path.
  IMAGE: ghcr.io/rick-wilson/bridge-analysis

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Test fixtures include a real .BWS (Microsoft Access) file; the
      # parser shells out to mdb-export so the test job needs mdbtools
      # installed. The runtime container also needs it (RUNTIME_PACKAGES
      # in the Dockerfile), but that's a separate install.
      - name: Install mdbtools
        run: sudo apt-get update && sudo apt-get install -y mdbtools

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --all

  build-and-push:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine tags
        id: tags
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            echo "tags=${IMAGE}:${VERSION},${IMAGE}:latest" >> "$GITHUB_OUTPUT"
          else
            echo "tags=${IMAGE}:main" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
