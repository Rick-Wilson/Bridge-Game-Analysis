name: Build Bridge Analysis

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Bridge-Club-Game-Analysis
        uses: actions/checkout@v4
        with:
          path: Bridge-Club-Game-Analysis

      - name: Checkout Bridge-Parsers
        uses: actions/checkout@v4
        with:
          repository: Rick-Wilson/Bridge-Parsers
          path: Bridge-Parsers

      - name: Install mdbtools
        run: sudo apt-get update && sudo apt-get install -y mdbtools

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build CLI
        run: |
          cd Bridge-Club-Game-Analysis
          cargo build --release -p bridge-analysis

      - name: Build Web Server
        run: |
          cd Bridge-Club-Game-Analysis
          cargo build --release -p bridge-analysis-web

      - name: Run tests
        run: |
          cd Bridge-Club-Game-Analysis
          cargo test --all

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bridge-analysis-linux-x64
          path: |
            Bridge-Club-Game-Analysis/target/release/bridge-analysis
            Bridge-Club-Game-Analysis/target/release/bridge-analysis-web

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux-x64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package release
        run: |
          cd artifacts
          mkdir -p release
          find bridge-analysis-linux-x64 -name 'bridge-analysis' -exec cp {} release/ \;
          find bridge-analysis-linux-x64 -name 'bridge-analysis-web' -exec cp {} release/ \;
          chmod +x release/bridge-analysis release/bridge-analysis-web
          tar czf bridge-analysis-${{ github.ref_name }}-linux-x64.tar.gz -C release .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/bridge-analysis-${{ github.ref_name }}-linux-x64.tar.gz
          generate_release_notes: true
